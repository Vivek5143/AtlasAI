services:
  postgres:
    image: postgres:16
    container_name: atlasai-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: atlasai
      POSTGRES_USER: atlasai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlasai -d atlasai"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: atlasai-backend
    restart: unless-stopped

    environment:
      APP_NAME: AtlasAI
      APP_VERSION: 1.0.0
      DEBUG: "false"

      DATABASE_URL: postgresql://atlasai:${POSTGRES_PASSWORD}@postgres:5432/atlasai
      SECRET_KEY: ${SECRET_KEY}

      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_MODEL_NAME: gemini-3.5-flash

      CHROMA_DB_PATH: /app/chroma_data
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5

      NEWS_API_KEY: ${NEWS_API_KEY}

      NEWS_SYNC_LOOKBACK_DAYS: 7
      NEWS_SYNC_MAX_COMPANIES_PER_REFRESH: 25
      NEWS_SYNC_PAGE_SIZE: 10
      NEWS_SYNC_ROTATION_WINDOW_MINUTES: 60

      RAG_TOP_K: 4

    volumes:
      - chroma_data:/app/chroma_data

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: atlasai-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend


volumes:
  postgres_data:
    name: atlasai_postgres_data

  chroma_data:
    name: atlasai_chroma_data