services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: atlasai-backend
    restart: unless-stopped

    environment:
      APP_NAME: AtlasAI
      APP_VERSION: 1.0.0
      DEBUG: "false"

      # Connect Docker backend to PostgreSQL running on Windows
      DATABASE_URL: postgresql://postgres:${LOCAL_POSTGRES_PASSWORD}@host.docker.internal:5434/insightforge_ai

      SECRET_KEY: ${SECRET_KEY}

      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_MODEL_NAME: gemini-3.5-flash

      CHROMA_DB_PATH: /app/chroma_data
      EMBEDDING_MODEL: BAAI/bge-small-en-v1.5

      NEWS_API_KEY: ${NEWS_API_KEY}

      NEWS_SYNC_LOOKBACK_DAYS: 7
      NEWS_SYNC_MAX_COMPANIES_PER_REFRESH: 25
      NEWS_SYNC_PAGE_SIZE: 10
      NEWS_SYNC_ROTATION_WINDOW_MINUTES: 60

      RAG_TOP_K: 4

    volumes:
      - chroma_data:/app/chroma_data

    ports:
      - "8001:8000"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: atlasai-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    depends_on:
      - backend


volumes:
  chroma_data:
    name: atlasai_chroma_data